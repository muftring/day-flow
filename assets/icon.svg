<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#22223a"/>
      <stop offset="100%" stop-color="#0b0b10"/>
    </radialGradient>
    <radialGradient id="ring" cx="50%" cy="50%" r="50%">
      <stop offset="82%" stop-color="transparent" stop-opacity="0"/>
      <stop offset="88%" stop-color="#d4a843" stop-opacity="0.6"/>
      <stop offset="94%" stop-color="#d4a843" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b8891e" stop-opacity="0.7"/>
    </radialGradient>
    <clipPath id="circle-clip">
      <circle cx="512" cy="512" r="480"/>
    </clipPath>
  </defs>

  <!-- Base circle -->
  <circle cx="512" cy="512" r="492" fill="#0b0b10"/>
  <circle cx="512" cy="512" r="480" fill="url(#bg)"/>

  <!-- Gold outer ring -->
  <circle cx="512" cy="512" r="480" fill="none"
          stroke="#d4a843" stroke-width="18" stroke-opacity="0.85"/>
  <circle cx="512" cy="512" r="462" fill="none"
          stroke="#d4a843" stroke-width="3" stroke-opacity="0.25"/>

  <!-- Content clipped to circle -->
  <g clip-path="url(#circle-clip)">

    <!-- Hour tick marks (subtle) -->
    <g stroke="#d4a843" stroke-opacity="0.18" stroke-width="4" stroke-linecap="round">
      <!-- 12 evenly spaced ticks around r=400 -->
      <line x1="512" y1="148" x2="512" y2="188"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(30 512 512)"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(60 512 512)"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(90 512 512)"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(120 512 512)"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(150 512 512)"/>
      <line x1="512" y1="836" x2="512" y2="876"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(210 512 512)"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(240 512 512)"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(270 512 512)"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(300 512 512)"/>
      <line x1="712" y1="200" x2="692" y2="235" transform="rotate(330 512 512)"/>
    </g>

    <!-- Main flow arc — gold, sweeping 270° like a day (6am → midnight) -->
    <path d="M 512 158
             A 354 354 0 1 1 218 668"
          fill="none"
          stroke="url(#arcGold)"
          stroke-width="42"
          stroke-linecap="round"
          stroke-opacity="0.0"/>

    <!-- Flowing wave ribbon — represents timeline across the day -->
    <path d="M 162 520
             C 260 420, 340 620, 512 510
             C 684 400, 764 600, 862 500"
          fill="none"
          stroke="#d4a843"
          stroke-width="38"
          stroke-linecap="round"
          stroke-opacity="0.88"/>

    <!-- Second wave (teal, offset) -->
    <path d="M 162 570
             C 260 470, 340 670, 512 560
             C 684 450, 764 650, 862 550"
          fill="none"
          stroke="#3fd4c4"
          stroke-width="22"
          stroke-linecap="round"
          stroke-opacity="0.72"/>

    <!-- Center pivot dot -->
    <circle cx="512" cy="512" r="36" fill="#d4a843" opacity="0.92"/>
    <circle cx="512" cy="512" r="20" fill="#3fd4c4" opacity="0.95"/>

    <!-- Clock hand pointing to ~10 o'clock (morning focus) -->
    <line x1="512" y1="512" x2="345" y2="318"
          stroke="#d4a843" stroke-width="26"
          stroke-linecap="round" stroke-opacity="0.9"/>
    <!-- Minute hand (shorter, teal) -->
    <line x1="512" y1="512" x2="648" y2="290"
          stroke="#3fd4c4" stroke-width="16"
          stroke-linecap="round" stroke-opacity="0.85"/>

  </g>

  <!-- Subtle inner glow at top -->
  <radialGradient id="topGlow" cx="50%" cy="5%" r="40%">
    <stop offset="0%" stop-color="#d4a843" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
  </radialGradient>
  <circle cx="512" cy="512" r="480" fill="url(#topGlow)"/>
</svg>
